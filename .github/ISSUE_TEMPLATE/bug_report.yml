name: Bug Report
description: Report a bug in apiscribe
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `apiscribe ./my-project`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: apiscribe Version
      description: Output of `apiscribe --version`
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Output of `node --version`
    validations:
      required: true
  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - Next.js App Router
        - Supabase Edge Functions
        - Express
        - Fastify
        - Other
